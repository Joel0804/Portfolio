<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Joel Dsilva</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { overflow-y: auto; }

    .page-layout {
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      min-width: 220px;
      background: #e0e0e0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 2rem;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      z-index: 1;
      position: relative;
    }

    .sidebar-name {
      font-size: 1.5rem;
      font-weight: 900;
      color: #111;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .sidebar-role {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sidebar-nav a {
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      color: #111;
      font-weight: 700;
    }

    .main {
      flex: 1;
      background: #111;
      padding: 3.5rem 4rem;
      margin-left: -40px;
      overflow-y: auto;
    }

    .page-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.6rem;
    }

    .page-title {
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    .page-subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 3rem;
    }

    /* Contact cards */
    .contact-cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 480px;
      margin-bottom: 3rem;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: #181818;
      border: 1px solid #242424;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .contact-card:hover {
      border-color: #444;
      background: #1e1e1e;
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      background: #222;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      flex-shrink: 0;
      font-size: 1rem;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
    }

    .contact-type {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.2rem;
    }

    .contact-value {
      color: #ddd;
      font-size: 0.95rem;
    }

    .contact-arrow {
      margin-left: auto;
      color: #444;
      font-size: 1rem;
    }

    /* Simple contact form */
    .form-heading {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.2rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      max-width: 480px;
    }

    .contact-form input,
    .contact-form textarea {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: #ddd;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: #444;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #555;
    }

    .contact-form textarea {
      height: 120px;
    }

    .submit-btn {
      align-self: flex-start;
      background: #e0e0e0;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #fff;
    }

    .form-note {
      font-size: 0.78rem;
      color: #444;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="page-layout">

    <aside class="sidebar">
      <div>
        <p class="sidebar-name">Joel<br>Dsilva</p>
        <p class="sidebar-role">Front-end Dev / UI Designer</p>
      </div>
      <nav class="sidebar-nav">
        <a href="/">Home</a>
        <a href="/about">About me</a>
        <a href="/skills">Skills</a>
        <a href="/contact" class="active">Contact</a>
        <a href="/projects">Project</a>
      </nav>
    </aside>

    <main class="main">

      <p class="page-label fade-in">Get in touch</p>

      <p class="page-subtitle fade-in delay-2">Open to opportunities, collabs, or just a chat.</p>

      <!-- Direct contact cards -->
      <div class="contact-cards">

            <span class="contact-type">Email</span>
            <span class="contact-value">joeldsilva0804@gmail.com</span>
          </div>

        </a>

        <a href="https://github.com/Joel0804" target="_blank" class="contact-card fade-in delay-3">

            </svg>
          </div>
          <div class="contact-info">
            <span class="contact-type">GitHub</span>

          </div>
          <span class="contact-arrow">→</span>
        </a>

        <a href="https://www.linkedin.com/in/joel-dsilva-855524310/" target="_blank" class="contact-card fade-in delay-4">
          <div class="contact-icon">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
              <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 0 1 .016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/>
            </svg>
          </div>
          <div class="contact-info">
            <span class="contact-type">LinkedIn</span>
            <span class="contact-value">joel-dsilva-855524310</span>
          </div>
          <span class="contact-arrow">→</span>
        </a>
      </div>

      <!-- Contact form -->
      <p class="form-heading fade-in">Or send a message</p>
      <div class="contact-form fade-in delay-1">
        <input type="text" placeholder="Your name" id="contact-name">
        <input type="email" placeholder="Your email" id="contact-email">
        <textarea placeholder="What's on your mind?" id="contact-message"></textarea>
        <button class="submit-btn" id="submit-btn">Send message</button>
        <p class="form-note" id="form-note"></p>
      </div>

    </main>
  </div>
  <script src="/static/main.js"></script>
  <script src="/static/contact.js"></script>
</body>
</html>
